version: '3.8'

services:
  tv-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tv-microservice
    # Using explicit port mapping instead of host network to ensure 
    # compatibility with Docker Desktop on Linux/Mac/Windows.
    ports:
      - "${PORT:-8000}:8000"
    environment:
      - PORT=8000
      - FIRE_TV_IP=${FIRE_TV_IP:-192.168.1.100}
      - API_KEY=${API_KEY:-my_super_secret_api_key_123}
    volumes:
      # CRITICAL: Persists the RSA keys ADB generates. 
      # Without this, the TV will revoke authorization every time the container restarts
      # requiring manual approval click on the TV screen again.
      - adb_keys:/root/.android/
    restart: unless-stopped

volumes:
  adb_keys:
    name: tv-microservice-adb-keys
